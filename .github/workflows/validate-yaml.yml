name: Validate YAML

on:
  push:
  pull_request:

jobs:
  validate-yaml:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
      - name: 🛠️ Install yamllint
        run: pip install yamllint
      - name: ✅ Lint all YAML files
        run: |
          find . -type f \( -name '*.yml' -o -name '*.yaml' \) -print0 \
            | xargs -0 yamllint
